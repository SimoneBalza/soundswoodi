<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundswood.I – Say It Loud.</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #d8d8d8;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* Full-bleed frosted/textured background */
    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 50% 50%, rgba(255,255,255,0.85) 0%, transparent 70%),
        radial-gradient(ellipse 40% 80% at 10% 50%, rgba(200,200,200,0.6) 0%, transparent 60%),
        radial-gradient(ellipse 40% 80% at 90% 50%, rgba(200,200,200,0.6) 0%, transparent 60%),
        linear-gradient(135deg, #c8c8c8 0%, #e8e8e8 40%, #f5f5f5 50%, #e5e5e5 60%, #c5c5c5 100%);
      filter: contrast(1.05);
    }

    /* Noise texture overlay */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.18;
      mix-blend-mode: multiply;
    }

    /* Bright center glow */
    .glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 55% 55% at 50% 48%, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.4) 40%, transparent 70%);
      pointer-events: none;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1200px;
      padding: 0 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo */
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeDown 0.8s ease forwards 0.2s;
    }

    .logo-icon {
      width: 68px;
      height: 68px;
      margin-bottom: 8px;
    }

    .logo-text {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      color: #1a1a1a;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.5;
    }

    /* Headline */
    .headline {
      font-size: clamp(72px, 12vw, 160px);
      font-weight: 900;
      font-stretch: condensed;
      line-height: 0.92;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      background: linear-gradient(90deg,
        #8B2FC9 0%,
        #C4308A 28%,
        #D95070 45%,
        #E07060 60%,
        #E89040 80%,
        #F0B030 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.45s;
      font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
      white-space: nowrap;
    }

    /* Date */
    .date {
      margin-top: 36px;
      font-size: clamp(22px, 3.5vw, 42px);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #a0a0a8;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.9s;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .headline {
        font-size: clamp(48px, 14vw, 80px);
        white-space: normal;
        text-align: center;
      }
      .container { padding: 0 24px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="glow"></div>

  <div class="container">

    <!-- Logo SVG (replicates the OU/OO mark) -->
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Top row: circle (O) + U shape -->
        <!-- O top-left -->
        <circle cx="20" cy="20" r="10.5" stroke="#1a1a1a" stroke-width="2.2" fill="none"/>
        <!-- U top-right (open bottom) -->
        <path d="M37.5 10 Q37.5 30.5 48 30.5 Q58.5 30.5 58.5 10" stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        <!-- Bottom row: two circles -->
        <!-- O bottom-left -->
        <circle cx="20" cy="49" r="10.5" stroke="#1a1a1a" stroke-width="2.2" fill="none"/>
        <!-- O bottom-right -->
        <circle cx="48" cy="49" r="10.5" stroke="#1a1a1a" stroke-width="2.2" fill="none"/>
      </svg>
      <span class="logo-text">SOUNDS<br>WOOD.I</span>
    </div>

    <!-- Main tagline -->
    <h1 class="headline">SAY IT LOUD.</h1>

    <!-- Date -->
    <p class="date">21.04.2026</p>

  </div>

</body>
</html>
