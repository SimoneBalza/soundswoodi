<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundswood.I – Say It Loud.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;900&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #8B2FC9;
      --pink: #C4308A;
      --coral: #D95070;
      --orange: #E89040;
      --gold: #F0B030;
      --text-light: #1a1a1a;
      --text-muted: #a0a0a8;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Barlow', sans-serif;
    }

    body {
      background-color: #d0d0d0;
      position: relative;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 65% 65% at 50% 45%, rgba(255,255,255,0.88) 0%, transparent 70%),
        radial-gradient(ellipse 38% 80% at 5% 50%,  rgba(190,190,190,0.7) 0%, transparent 60%),
        radial-gradient(ellipse 38% 80% at 95% 50%, rgba(190,190,190,0.7) 0%, transparent 60%),
        linear-gradient(135deg, #b8b8b8 0%, #dcdcdc 40%, #f0f0f0 50%, #e0e0e0 60%, #c0c0c0 100%);
    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: 0.17;
      mix-blend-mode: multiply;
      pointer-events: none;
    }
    .glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 50% 50% at 50% 46%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.3) 45%, transparent 70%);
      pointer-events: none;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    /* ── FONDERIA LOGO (top-right) ── */
    .fonderia-link {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 100;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards 1.4s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .fonderia-logo-svg {
      height: 80px;
      width: auto;
      transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0.82;
    }
    .fonderia-link:hover .fonderia-logo-svg {
      transform: scale(1.07);
      opacity: 1;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 52px;
    }

    .logo-wrap {
      opacity: 0;
      animation: fadeDown 0.8s ease forwards 0.2s;
      margin-bottom: 10px;
    }

    .tagline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(68px, 11vw, 148px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 0.92;
      background: linear-gradient(90deg,
        #8B2FC9 0%, #C4308A 28%, #D95070 45%,
        #E07060 60%, #E89040 80%, #F0B030 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) forwards 0.4s;
      text-align: center;
    }

    .date {
      font-family: 'Barlow', sans-serif;
      font-size: clamp(18px, 2.8vw, 32px);
      font-weight: 300;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      margin-top: 18px;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.75s;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--gold));
      border-radius: 2px;
      margin: 40px 0;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards 1s;
    }

    /* ── PRODUCTS ── */
    .products-section {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.05s;
      width: 100%;
      max-width: 860px;
      margin-bottom: 56px;
    }

    .products-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .product-card {
      background: rgba(255,255,255,0.52);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 16px;
      padding: 20px 16px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
    }

    .product-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      overflow: hidden;
      background: linear-gradient(135deg, #c830a0, #f0a030);
    }
    .product-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-light);
      text-align: center;
      line-height: 1.2;
    }

    /* ── BUTTONS ── */
    .buttons-section {
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.15s;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 50px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: none;
      outline: none;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(0,0,0,0.18);
    }
    .btn:active { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(90deg, var(--purple), var(--pink), var(--orange));
      color: #fff;
      box-shadow: 0 6px 20px rgba(139,47,201,0.3);
    }

    .btn-outline {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      color: var(--text-light);
      border: 1.5px solid rgba(139,47,201,0.35);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.85);
      border-color: var(--purple);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    .footer-note {
      margin-top: 60px;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards 1.5s;
      text-align: center;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .page { padding: 48px 16px 60px; }
      .fonderia-link { top: 16px; right: 16px; }
      .fonderia-logo-svg { height: 56px; }
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .btn { padding: 14px 22px; font-size: 14px; }
    }
  </style>
</head>
<body>

  </div>

</body>
</html>
